name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Disabled during the Phase 0 → Phase 3 dark window.
# The repo is mid-cutover from a single Next.js app at root to a pnpm workspace
# with apps/docs/ + packages/{lib,cli,skills}. This workflow's npm ci + npm run
# build no longer match the new structure. Phase 3 (#221) re-enables it and
# repaths against apps/docs/out/ with pnpm.
jobs:
  build:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /field-notes

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: false
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
